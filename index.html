<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Vendedor - Martinello</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ARQUIVO DE HORÁRIO -->
    <script src="horario.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #d0252a;
            --primary-dark: #a01d21;
            --whatsapp-color: #25D366;
            --whatsapp-dark: #128C7E;
            --bg-light: #f4f4f4;
            --bg-dark: #1a1a1a;
            --text-light: #333;
            --text-dark: #f4f4f4;
            --card-light: white;
            --card-dark: #2d2d2d;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        body.dark-mode .card {
            background: var(--card-dark);
            color: var(--text-dark);
        }

        body.dark-mode input {
            background: #3d3d3d;
            color: white;
            border-color: #555;
        }

        body.dark-mode input::placeholder {
            color: #aaa;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding: 0;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .header {
            background: var(--primary-color);
            padding: 25px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(208, 37, 42, 0.3);
            position: relative;
            z-index: 100;
        }

        .logo-image {
            height: 100px;
            width: auto;
            object-fit: contain;
            transition: 0.3s;
        }

        .dark-mode-toggle {
            position: absolute;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
        }

        .dark-mode-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(180deg);
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: calc(100vh - 130px);
        }

        .card {
            background: var(--card-light);
            padding: 30px 25px;
            border-radius: 30px;
            max-width: 450px;
            width: 100%;
            margin: 20px auto;
            box-shadow: 0 20px 40px rgba(208, 37, 42, 0.15);
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease;
            border: 1px solid rgba(208, 37, 42, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(208, 37, 42, 0.2);
            position: relative;
            display: inline-block;
        }

        h2:after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .product-image {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 3px solid white;
        }

        .product-image:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(208, 37, 42, 0.2);
        }

        .input-group {
            position: relative;
            margin: 20px 0;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 18px;
        }

        input { 
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
            background: var(--card-light);
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(208, 37, 42, 0.1);
        }

        input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            font-size: 18px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(208, 37, 42, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(208, 37, 42, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #999;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--whatsapp-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            border: none;
            animation: pulse 2s infinite;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background: var(--whatsapp-dark);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.5);
            animation: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(37, 211, 102, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
            }
        }

        .whatsapp-tooltip {
            position: absolute;
            right: 70px;
            background: white;
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            pointer-events: none;
        }

        .whatsapp-float:hover .whatsapp-tooltip {
            opacity: 1;
            visibility: visible;
            right: 80px;
        }

        @media (max-width: 768px) {
            .logo-image {
                height: 90px;
            }
            
            h2 {
                font-size: 28px;
            }

            .btn-primary {
                font-size: 16px;
                padding: 15px;
            }

            .whatsapp-float {
                width: 50px;
                height: 50px;
                font-size: 25px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .logo-image {
                height: 80px;
            }
            
            h2 {
                font-size: 24px;
            }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 8px 15px rgba(208, 37, 42, 0.3);
            }
            50% {
                box-shadow: 0 8px 25px rgba(208, 37, 42, 0.6);
            }
        }

        .mensagem-embreve {
            color: #666;
            margin: 15px 0;
            font-size: 16px;
            line-height: 1.5;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            display: none;
            white-space: pre-line;
        }

        .debug-panel {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: left;
            border: 1px solid #eee;
        }

        .debug-panel div {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<header class="header">
    <img src="logo.png" alt="Logo Martinello" class="logo-image">
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon"></i>
    </button>
</header>

<div class="main-container">
    <div class="card">
        <h2 id="tituloPagina">DISPARO EM ANDAMENTO!</h2>
        
        <img id="fotoProduto" class="product-image" src="produto.png" alt="Imagem do Produto">
        
        <!-- Mensagem para tela "EM BREVE" -->
        <div id="mensagemEmBreve" class="mensagem-embreve"></div>
        
        <div class="input-group">
            <i class="fas fa-tag input-icon"></i>
            <input type="text" id="cod" placeholder="DIGITE SUA MATRÍCULA AQUI!" oninput="validarMatricula(this)">
        </div>
        
        <button class="btn-primary" onclick="enviar()" id="btnEnviar">
            <span class="btn-text">GERAR E ENVIAR NO WHATSAPP</span>
        </button>
        
        <!-- PAINEL DE DEBUG -->
        <div class="debug-panel">
            <div>🕒 <strong>Horário Brasília:</strong> <span id="debugHoraBrasilia"></span></div>
            <div>📅 <strong>Oferta:</strong> <span id="debugOfertaInfo"></span></div>
            <div>⏰ <strong>Status:</strong> <span id="debugStatus"></span></div>
        </div>
    </div>
</div>

<a href="https://wa.me/556598115091?text=Olá!%20Preciso%20de%20ajuda%20com%20o%20Portal%20do%20Vendedor%20Martinello" 
   class="whatsapp-float" 
   target="_blank"
   title="Suporte via WhatsApp">
    <i class="fab fa-whatsapp"></i>
    <span class="whatsapp-tooltip">Precisa de ajuda?</span>
</a>

<script>
// ============================================
// VERIFICAR SE O HORARIO.JS CARREGOU
// ============================================
if (typeof getHorarioBrasilia !== 'function') {
    console.error('❌ ERRO: horario.js não carregou corretamente!');
    alert('Erro ao carregar sistema de horário. Recarregue a página.');
} else {
    console.log('✅ horario.js carregado com sucesso!');
}

// ============================================
// CONFIGURAÇÕES DA TELA "EM BREVE"
// ============================================
let configTelaEmBreve = {
    imagem: 'produto.png',
    titulo: 'EM BREVE',
    mensagem: 'Estamos preparando novidades especiais para você! Fique ligado.'
};

try {
    const configSalva = localStorage.getItem('configTelaEmBreve');
    if (configSalva) {
        configTelaEmBreve = { ...configTelaEmBreve, ...JSON.parse(configSalva) };
        console.log('✅ Configurações "EM BREVE" carregadas:', configTelaEmBreve);
    }
} catch (e) {
    console.error('Erro ao carregar config:', e);
}

// ============================================
// VERIFICAR STATUS DA OFERTA (COM DIAGNÓSTICO)
// ============================================
function verificarStatus() {
    try {
        // 1️⃣ Atualizar horário
        const agoraBrasilia = getHorarioBrasilia();
        document.getElementById('debugHoraBrasilia').innerText = formatarBrasilia(agoraBrasilia.toISOString());
        
        // 2️⃣ DIAGNÓSTICO: Mostrar TODOS os itens do localStorage
        console.log('=== DIAGNÓSTICO DO LOCALSTORAGE ===');
        console.log('Todos os itens:');
        for (let i = 0; i < localStorage.length; i++) {
            const chave = localStorage.key(i);
            const valor = localStorage.getItem(chave);
            console.log(`- ${chave}:`, valor.substring(0, 100) + '...');
        }
        
        // 3️⃣ Tentar carregar a oferta de diferentes formas
        let oferta = null;
        let ofertaAtiva = null;
        let modoExpirado = localStorage.getItem('modoExpirado') === 'true';
        
        // Tentar pela chave 'ofertaAtiva' (a que usamos)
        try {
            const ofertaStr = localStorage.getItem('ofertaAtiva');
            if (ofertaStr) {
                ofertaAtiva = JSON.parse(ofertaStr);
                console.log('✅ ofertaAtiva encontrada:', ofertaAtiva);
            } else {
                console.log('❌ Nenhuma ofertaAtiva encontrada');
            }
        } catch (e) {
            console.error('Erro ao ler ofertaAtiva:', e);
        }
        
        // Tentar pela chave 'ofertasMartinello' (lista completa)
        try {
            const ofertasStr = localStorage.getItem('ofertasMartinello');
            if (ofertasStr) {
                const ofertas = JSON.parse(ofertasStr);
                console.log('✅ ofertasMartinello encontrada:', ofertas.length, 'ofertas');
                
                // Verificar se alguma oferta está ativa AGORA
                const agora = getHorarioBrasilia();
                for (const of of ofertas) {
                    const inicio = new Date(of.dataInicio);
                    const fim = new Date(of.dataFim);
                    if (agora >= inicio && agora <= fim) {
                        oferta = of;
                        console.log('✅ Oferta ativa encontrada na lista:', of);
                        break;
                    }
                }
            } else {
                console.log('❌ Nenhuma ofertasMartinello encontrada');
            }
        } catch (e) {
            console.error('Erro ao ler ofertasMartinello:', e);
        }
        
        // 4️⃣ Usar a oferta encontrada (prioridade para ofertaAtiva)
        const ofertaFinal = ofertaAtiva || oferta;
        
        if (!ofertaFinal || modoExpirado) {
            console.log('ℹ️ Modo EM BREVE ativado');
            aplicarModoEmBreve();
            document.getElementById('debugOfertaInfo').innerText = 'Nenhuma oferta ativa';
            document.getElementById('debugStatus').innerHTML = '<span style="color:orange">⏸️ EM BREVE</span>';
            return;
        }
        
        // 5️⃣ Verificar se a oferta tem as datas necessárias
        if (!ofertaFinal.dataInicio || !ofertaFinal.dataFim) {
            console.error('❌ Oferta sem datas:', ofertaFinal);
            aplicarModoEmBreve();
            document.getElementById('debugOfertaInfo').innerText = 'Oferta inválida';
            document.getElementById('debugStatus').innerHTML = '<span style="color:orange">⏸️ EM BREVE</span>';
            return;
        }
        
        // 6️⃣ Verificar se está ativa
        const ativa = isOfertaAtiva(ofertaFinal);
        
        console.log('📊 Dados da oferta:', {
            titulo: ofertaFinal.tituloPagina,
            inicio: ofertaFinal.dataInicio,
            fim: ofertaFinal.dataFim,
            inicioBrasilia: formatarBrasilia(ofertaFinal.dataInicio),
            fimBrasilia: formatarBrasilia(ofertaFinal.dataFim),
            ativa: ativa
        });
        
        // 7️⃣ Atualizar interface
        document.getElementById('debugOfertaInfo').innerHTML = 
            `${ofertaFinal.tituloPagina || 'Oferta'} (${formatarBrasilia(ofertaFinal.dataInicio)} até ${formatarBrasilia(ofertaFinal.dataFim)})`;
        
        if (ativa) {
            // OFERTA ATIVA
            document.querySelector('h2').innerText = ofertaFinal.tituloPagina || 'DISPARO EM ANDAMENTO!';
            if (ofertaFinal.urlImagem) {
                document.getElementById('fotoProduto').src = ofertaFinal.urlImagem;
            }
            document.getElementById('cod').disabled = false;
            document.getElementById('btnEnviar').disabled = false;
            document.querySelector('.btn-text').textContent = 'GERAR E ENVIAR NO WHATSAPP';
            document.getElementById('mensagemEmBreve').style.display = 'none';
            document.getElementById('debugStatus').innerHTML = '<span style="color:green">✅ ATIVA</span>';
            console.log('🎯 OFERTA ATIVA!');
        } else {
            aplicarModoEmBreve();
            document.getElementById('debugStatus').innerHTML = '<span style="color:red">❌ INATIVA</span>';
            console.log('⏰ Oferta inativa no momento');
        }
        
    } catch (error) {
        console.error('❌ Erro crítico em verificarStatus:', error);
        aplicarModoEmBreve();
    }
}

// ============================================
// DEMAIS FUNÇÕES
// ============================================
function validarMatricula(input) {
    let valor = input.value.replace(/\D/g, '').replace(/^0+/, '');
    input.value = valor;
}

let enviando = false;
const TIMEOUT_MS = 5000;

async function validarImagem(src) {
    if (!src || src === '') return false;
    try {
        const response = await fetch(src, { method: 'HEAD' });
        return response.ok;
    } catch {
        return false;
    }
}

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const icon = document.querySelector('.dark-mode-toggle i');
    if(document.body.classList.contains('dark-mode')) {
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
    } else {
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
    }
}

function getBrowserName() {
    const ua = navigator.userAgent;
    const platform = navigator.platform;
    
    if (ua.includes('SamsungBrowser')) return 'Samsung Internet';
    
    const isIOS = /iPad|iPhone|iPod/.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    
    if (isIOS) {
        if (ua.includes('CriOS')) return 'Chrome (iOS)';
        if (ua.includes('FxiOS')) return 'Firefox (iOS)';
        if (ua.includes('EdgiOS')) return 'Edge (iOS)';
        return 'Safari (iOS)';
    }
    
    if (ua.includes('Android')) {
        if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome (Android)';
        if (ua.includes('Firefox')) return 'Firefox (Android)';
        if (ua.includes('Edg')) return 'Edge (Android)';
        return 'Navegador Padrão (Android)';
    }
    
    if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome (Desktop)';
    if (ua.includes('Safari') && !ua.includes('Chrome') && !ua.includes('Edg')) return 'Safari (Desktop)';
    if (ua.includes('Edg')) return 'Edge (Desktop)';
    if (ua.includes('Firefox')) return 'Firefox (Desktop)';
    if (ua.includes('OPR') || ua.includes('Opera')) return 'Opera (Desktop)';
    
    return 'Outro/Desconhecido';
}

function setLoading(isLoading) {
    const btn = document.getElementById('btnEnviar');
    const btnText = btn.querySelector('.btn-text');
    
    if(isLoading) {
        btn.disabled = true;
        btnText.innerHTML = '<span class="spinner"></span>Processando...';
    } else {
        btn.disabled = false;
        btnText.textContent = 'GERAR E ENVIAR NO WHATSAPP';
    }
}

async function enviar() {
    const oferta = JSON.parse(localStorage.getItem('ofertaAtiva'));
    if (!oferta) {
        alert('Nenhuma oferta ativa no momento. Aguarde a próxima promoção!');
        return;
    }
    
    if (enviando) return;
    
    try {
        const codInput = document.getElementById('cod').value.trim();
        if(!codInput) { 
            alert("Por favor, digite sua matrícula!"); 
            return; 
        }

        enviando = true;
        setLoading(true);

        const navegador = getBrowserName();
        const linkFinal = `https://www.martinello.com.br/parceiros/${codInput}?redir=${encodeURIComponent(oferta.linkProduto)}`;
        const textoDaOferta = oferta.textoOferta
            .replace('[LINK]', linkFinal)
            .replace('[CODIGO]', codInput);

        // Rastreio
        try {
            const CONFIG = {
                googleFormUrl: "https://docs.google.com/forms/d/e/1FAIpQLSfdheHBbGMCLIXXAeM0b8rTbpextHznj6BDS6lKGLN9ZMjd4g/formResponse",
                entryIdCodigo: "entry.200360405",
                entryIdBrowser: "entry.2003110990"
            };
            
            if(CONFIG.googleFormUrl.includes("formResponse")) {
                const formData = new FormData();
                formData.append(CONFIG.entryIdCodigo, codInput);
                formData.append(CONFIG.entryIdBrowser, navegador);
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);
                
                await fetch(CONFIG.googleFormUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData,
                    signal: controller.signal
                }).finally(() => clearTimeout(timeoutId));
            }
        } catch (error) {
            console.error("Erro no rastreio:", error);
        }

        // Compartilhamento
        try {
            const imgElement = document.getElementById('fotoProduto');
            const imagemValida = await validarImagem(imgElement.src);
            if (!imagemValida) throw new Error('Imagem inválida');
            
            const response = await fetch(imgElement.src);
            const blob = await response.blob();
            
            if (blob.type.startsWith('image/')) {
                const file = new File([blob], 'oferta.png', { type: 'image/png' });

                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        text: textoDaOferta
                    });
                    setLoading(false);
                    enviando = false;
                    return;
                }
            }
        } catch (error) {
            console.log("Usando fallback WhatsApp");
            window.open(`https://wa.me/?text=${encodeURIComponent(textoDaOferta)}`, '_blank');
        }
        
        setLoading(false);
        enviando = false;
    } catch (error) {
        console.error("Erro:", error);
        alert("Ocorreu um erro. Tente novamente.");
        setLoading(false);
        enviando = false;
    }
}

// ============================================
// INICIALIZAÇÃO (SEM ERROS)
// ============================================
function iniciar() {
    try {
        verificarImagem(document.getElementById('fotoProduto'));
        verificarStatus();
        setInterval(verificarStatus, 1000);
        
        setInterval(() => {
            const btn = document.getElementById('btnEnviar');
            if (btn && !btn.disabled) {
                btn.classList.add('glow');
                setTimeout(() => btn.classList.remove('glow'), 1000);
            }
        }, 3000);
    } catch (e) {
        // Silenciosamente ignorar erros de inicialização
    }
}

// Aguardar um pouco para garantir que tudo carregou
