<!DOCTYPE html>
<html lang="pt-br">
<head>

    <!-- Primeiro: Firebase SDK (ANTES de qualquer outro script!) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.2/firebase-database-compat.js"></script>
    
    <!-- Depois: Seus arquivos do Firebase -->
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-storage.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Vendedor - Martinello</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ARQUIVOS JS (ORDEM CORRETA) -->
    <!-- 1. Configurações primeiro -->
    <script src="js/config.js"></script>
    
    <!-- 2. Funções de horário -->
    <script src="js/horario-base.js"></script>
    <script src="js/horario-index.js"></script>
    
    <!-- 3. Utilitários -->
    <script src="js/utils.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/image.js"></script>
    
    <!-- 4. Storage -->
    <script src="js/storage.js"></script>
    
    <!-- 5. Serviços -->
    <script src="js/api.js"></script>
    <script src="js/cache.js"></script>
    
    <!-- 6. Interface -->
    <script src="js/ui.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #d0252a;
            --primary-dark: #a01d21;
            --whatsapp-color: #25D366;
            --whatsapp-dark: #128C7E;
            --bg-light: #f4f4f4;
            --bg-dark: #1a1a1a;
            --text-light: #333;
            --text-dark: #f4f4f4;
            --card-light: white;
            --card-dark: #2d2d2d;
            --embreve-bg: #f0f0f0;
            --embreve-text: #666;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
            --card-light: var(--card-dark);
            --embreve-bg: #3d3d3d;
            --embreve-text: #aaa;
        }

        body.dark-mode .card {
            background: var(--card-dark);
            color: var(--text-dark);
        }

        body.dark-mode input {
            background: #3d3d3d;
            color: white;
            border-color: #555;
        }

        body.dark-mode input::placeholder {
            color: #aaa;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding: 0;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .header {
            background: var(--primary-color);
            padding: 25px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(208, 37, 42, 0.3);
            position: relative;
            z-index: 100;
        }

        .logo-image {
            height: 100px;
            width: auto;
            object-fit: contain;
            transition: 0.3s;
        }

        .dark-mode-toggle {
            position: absolute;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
        }

        .dark-mode-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(180deg);
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: calc(100vh - 130px);
        }

        .card {
            background: var(--card-light);
            padding: 30px 25px;
            border-radius: 30px;
            max-width: 450px;
            width: 100%;
            margin: 20px auto;
            box-shadow: 0 20px 40px rgba(208, 37, 42, 0.15);
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease;
            border: 1px solid rgba(208, 37, 42, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(208, 37, 42, 0.2);
            position: relative;
            display: inline-block;
        }

        h2:after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .product-image {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 3px solid white;
        }

        .product-image:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(208, 37, 42, 0.2);
        }

        .input-group {
            position: relative;
            margin: 20px 0;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 18px;
        }

        input { 
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
            background: var(--card-light);
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(208, 37, 42, 0.1);
        }

        input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            font-size: 18px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(208, 37, 42, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(208, 37, 42, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #999;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--whatsapp-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            border: none;
            animation: pulse 2s infinite;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background: var(--whatsapp-dark);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.5);
            animation: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(37, 211, 102, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
            }
        }

        .whatsapp-tooltip {
            position: absolute;
            right: 70px;
            background: white;
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            pointer-events: none;
        }

        .whatsapp-float:hover .whatsapp-tooltip {
            opacity: 1;
            visibility: visible;
            right: 80px;
        }

        @media (max-width: 768px) {
            .logo-image {
                height: 90px;
            }
            
            h2 {
                font-size: 28px;
            }

            .btn-primary {
                font-size: 16px;
                padding: 15px;
            }

            .whatsapp-float {
                width: 50px;
                height: 50px;
                font-size: 25px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .logo-image {
                height: 80px;
            }
            
            h2 {
                font-size: 24px;
            }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 8px 15px rgba(208, 37, 42, 0.3);
            }
            50% {
                box-shadow: 0 8px 25px rgba(208, 37, 42, 0.6);
            }
        }

        .mensagem-embreve {
            color: var(--embreve-text);
            margin: 15px 0;
            font-size: 16px;
            line-height: 1.5;
            padding: 15px;
            background: var(--embreve-bg);
            border-radius: 10px;
            display: none;
            white-space: pre-line;
        }

        .info-panel {
            font-size: 13px;
            color: #666;
            margin-top: 20px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 10px;
            text-align: left;
            border: 1px solid #eee;
        }

        body.dark-mode .info-panel {
            background: #3d3d3d;
            color: #aaa;
            border-color: #555;
        }

        .info-panel div {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-panel i {
            width: 20px;
            color: var(--primary-color);
        }

        .status-text {
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .status-ativo {
            background: #28a745;
            color: white;
        }

        .status-inativo {
            background: #6c757d;
            color: white;
        }

        .status-embreve {
            background: #ffc107;
            color: black;
        }

        .empty-message {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

<header class="header">
    <img src="img/logo.png" alt="Logo Martinello" class="logo-image">
    <button class="dark-mode-toggle" onclick="TEMA.toggle()">
        <i class="fas fa-moon"></i>
    </button>
</header>

<div class="main-container">
    <div class="card">
        <h2 id="tituloPagina">DISPARO EM ANDAMENTO!</h2>
        
        <img id="fotoProduto" class="product-image" src="img/produto.png" alt="Imagem do Produto">
        
        <!-- Mensagem para quando não há oferta -->
        <div id="mensagemEmBreve" class="mensagem-embreve"></div>
        
        <div class="input-group">
            <i class="fas fa-tag input-icon"></i>
            <input type="text" id="cod" placeholder="DIGITE SUA MATRÍCULA AQUI!" oninput="validarMatricula(this)" maxlength="5">
        </div>
        
        <button class="btn-primary" onclick="enviar()" id="btnEnviar">
            <span class="btn-text">GERAR E ENVIAR NO WHATSAPP</span>
        </button>
        
        <!-- PAINEL DE INFORMAÇÕES -->
        <div class="info-panel">
            <div>
                <i class="fas fa-clock"></i>
                <strong>Horário Brasília:</strong> <span id="infoHoraBrasilia"></span>
            </div>
            <div>
                <i class="fas fa-tag"></i>
                <strong>Oferta:</strong> <span id="infoOferta">EM BREVE</span>
            </div>
            <div>
                <i class="fas fa-info-circle"></i>
                <strong>Status:</strong> <span id="infoStatus" class="status-text">SEM OFERTAS NO MOMENTO</span>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/556598115091?text=Olá!%20Preciso%20de%20ajuda%20com%20o%20Portal%20do%20Vendedor%20Martinello" 
   class="whatsapp-float" 
   target="_blank"
   title="Suporte via WhatsApp">
    <i class="fab fa-whatsapp"></i>
    <span class="whatsapp-tooltip">Precisa de ajuda?</span>
</a>

<script>
// ============================================
// CONFIGURAÇÕES DA TELA "EM BREVE"
// ============================================
let configTelaEmBreve = {
    imagem: 'img/produto.png',
    titulo: 'EM BREVE',
    mensagem: 'Estamos preparando novidades especiais para você! Fique ligado.'
};

try {
    const configSalva = localStorage.getItem('configTelaEmBreve');
    if (configSalva) {
        configTelaEmBreve = { ...configTelaEmBreve, ...JSON.parse(configSalva) };
        console.log('✅ Configurações "EM BREVE" carregadas');
    }
} catch (e) {}

// ============================================
// FUNÇÕES DE STORAGE (AGORA USANDO FIREBASE!)
// ============================================

// Carregar ofertas do Firebase
async function carregarOfertas() {
    return await carregarOfertasFirebase();
}

// Salvar ofertas no Firebase
async function salvarOfertas(novasOfertas) {
    return await salvarOfertasFirebase(novasOfertas);
}

// ============================================
// VERIFICAR STATUS DA OFERTA
// ============================================
async function verificarStatus() {
    try {
        const agoraBrasilia = getHorarioBrasilia();
        document.getElementById('infoHoraBrasilia').innerText = formatarBrasilia(agoraBrasilia);
        
        // CORREÇÃO: Adicionamos o "await" para esperar o Firebase
        const ofertas = await carregarOfertas(); 
        
        if (!Array.isArray(ofertas)) return;

        let ofertaAtiva = null;
        for (const oferta of ofertas) {
            const inicio = new Date(oferta.dataInicio);
            const fim = new Date(oferta.dataFim);
            if (agoraBrasilia >= inicio && agoraBrasilia <= fim) {
                ofertaAtiva = oferta;
                break;
            }
        }

        // ... resto do código de atualização da interface (que já está bom)
        
        // Atualizar oferta ativa no localStorage
        if (ofertaAtiva) {
            localStorage.setItem('ofertaAtiva', JSON.stringify(ofertaAtiva));
            localStorage.setItem('modoExpirado', 'false');
        } else {
            localStorage.removeItem('ofertaAtiva');
            localStorage.setItem('modoExpirado', 'true');
        }
        
        // 4️⃣ ATUALIZAR INTERFACE
        const statusElement = document.getElementById('infoStatus');
        const ofertaElement = document.getElementById('infoOferta');
        
        if (ofertaAtiva) {
            // ✅ MODO COM OFERTA ATIVA
            document.querySelector('h2').innerText = ofertaAtiva.tituloPagina;
            if (ofertaAtiva.urlImagem) {
                document.getElementById('fotoProduto').src = ofertaAtiva.urlImagem;
            }
            document.getElementById('cod').disabled = false;
            document.getElementById('btnEnviar').disabled = false;
            document.querySelector('.btn-text').textContent = 'GERAR E ENVIAR NO WHATSAPP';
            document.getElementById('mensagemEmBreve').style.display = 'none';
            
            // Atualizar painel de informações
            ofertaElement.innerHTML = `${ofertaAtiva.tituloPagina} (${formatarBrasilia(new Date(ofertaAtiva.dataInicio))} - ${formatarBrasilia(new Date(ofertaAtiva.dataFim))})`;
            statusElement.innerHTML = '✅ OFERTA ATIVA';
            statusElement.className = 'status-text status-ativo';
            
        } else {
            // ⏸️ MODO SEM OFERTA
            document.querySelector('h2').innerText = configTelaEmBreve.titulo;
            document.getElementById('fotoProduto').src = configTelaEmBreve.imagem;
            document.getElementById('cod').disabled = true;
            document.getElementById('btnEnviar').disabled = true;
            document.querySelector('.btn-text').textContent = 'EM BREVE';
            
            // Mostrar mensagem personalizada se existir
            const msgElement = document.getElementById('mensagemEmBreve');
            if (configTelaEmBreve.mensagem) {
                msgElement.innerText = configTelaEmBreve.mensagem;
                msgElement.style.display = 'block';
            } else {
                msgElement.style.display = 'none';
            }
            
            // Atualizar painel de informações
            ofertaElement.innerHTML = 'EM BREVE';
            statusElement.innerHTML = '⏸️ SEM OFERTAS NO MOMENTO';
            statusElement.className = 'status-text status-embreve';
        }
        
    } catch (error) {
        console.error('❌ Erro em verificarStatus:', error);
    }
}

// ============================================
// FUNÇÃO DE ENVIO
// ============================================
let enviando = false;

async function enviar() {
    // Verificar se há oferta ativa
    const oferta = JSON.parse(localStorage.getItem('ofertaAtiva'));
    if (!oferta) {
        if (typeof NOTIFICACAO !== 'undefined') {
            NOTIFICACAO.erro('Nenhuma oferta ativa no momento');
        } else {
            alert('Nenhuma oferta ativa no momento');
        }
        return;
    }
    
    if (enviando) return;
    
    try {
        const codInput = document.getElementById('cod').value.trim();
        if(!codInput) { 
            if (typeof NOTIFICACAO !== 'undefined') {
                NOTIFICACAO.erro('Digite sua matrícula');
            } else {
                alert('Digite sua matrícula');
            }
            return; 
        }

        enviando = true;
        
        // Mostrar loading
        const btn = document.getElementById('btnEnviar');
        const btnText = btn.querySelector('.btn-text');
        const textoOriginal = btnText.textContent;
        btn.disabled = true;
        btnText.innerHTML = '<span class="spinner"></span>Processando...';

        const navegador = typeof getBrowserName !== 'undefined' ? getBrowserName() : 'Desconhecido';
        const linkFinal = `https://www.martinello.com.br/parceiros/${codInput}?redir=${encodeURIComponent(oferta.linkProduto)}`;
        const textoDaOferta = typeof formatarTexto !== 'undefined' 
            ? formatarTexto(oferta.textoOferta, linkFinal, codInput)
            : oferta.textoOferta.replace('[LINK]', linkFinal).replace('[CODIGO]', codInput);

        // Rastreio (se API existir)
        if (typeof API !== 'undefined' && API.rastrear) {
            await API.rastrear(codInput, navegador);
        }

        // Compartilhamento (se API existir)
        if (typeof API !== 'undefined' && API.compartilhar) {
            const resultado = await API.compartilhar(textoDaOferta, document.getElementById('fotoProduto').src);
            if (resultado.sucesso && typeof NOTIFICACAO !== 'undefined') {
                NOTIFICACAO.sucesso('Compartilhado com sucesso!');
            }
        } else {
            // Fallback
            window.open(`https://wa.me/?text=${encodeURIComponent(textoDaOferta)}`, '_blank');
        }
        
        // Restaurar botão
        btn.disabled = false;
        btnText.textContent = textoOriginal;
        enviando = false;
        
    } catch (error) {
        console.error("Erro:", error);
        if (typeof NOTIFICACAO !== 'undefined') {
            NOTIFICACAO.erro('Erro ao compartilhar');
        } else {
            alert('Erro ao compartilhar');
        }
        
        const btn = document.getElementById('btnEnviar');
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = 'GERAR E ENVIAR NO WHATSAPP';
        enviando = false;
    }
}

// ============================================
// INICIALIZAÇÃO
// ============================================
function iniciar() {
    try {
        // Inicializar tema
        if (typeof TEMA !== 'undefined') {
            TEMA.init();
        }
        
        // Verificar imagem
        const img = document.getElementById('fotoProduto');
        if (typeof IMAGEM !== 'undefined' && IMAGEM.verificarCarregamento) {
            IMAGEM.verificarCarregamento(img, configTelaEmBreve.imagem);
        }
        
        // Iniciar verificação de status
        verificarStatus();
        setInterval(verificarStatus, 1000);
        
        console.log('✅ Portal do Vendedor iniciado');
        
    } catch (error) {
        console.error('❌ Erro na inicialização:', error);
    }
}

// Iniciar quando a página carregar
document.addEventListener('DOMContentLoaded', iniciar);

// Efeito de brilho no botão
setInterval(() => {
    const btn = document.getElementById('btnEnviar');
    if (btn && !btn.disabled) {
        btn.classList.add('glow');
        setTimeout(() => btn.classList.remove('glow'), 1000);
    }
}, 3000);
</script>

</body>
</html>
