<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Vendedor - Martinello</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #d0252a;
            --primary-dark: #a01d21;
            --whatsapp-color: #25D366;
            --whatsapp-dark: #128C7E;
            --bg-light: #f4f4f4;
            --bg-dark: #1a1a1a;
            --text-light: #333;
            --text-dark: #f4f4f4;
            --card-light: white;
            --card-dark: #2d2d2d;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        body.dark-mode .card {
            background: var(--card-dark);
            color: var(--text-dark);
        }

        body.dark-mode input {
            background: #3d3d3d;
            color: white;
            border-color: #555;
        }

        body.dark-mode input::placeholder {
            color: #aaa;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding: 0;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .header {
            background: var(--primary-color);
            padding: 25px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(208, 37, 42, 0.3);
            position: relative;
            z-index: 100;
        }

        .logo-image {
            height: 100px;
            width: auto;
            object-fit: contain;
            transition: 0.3s;
        }

        .dark-mode-toggle {
            position: absolute;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
        }

        .dark-mode-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(180deg);
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: calc(100vh - 130px);
        }

        .card {
            background: var(--card-light);
            padding: 30px 25px;
            border-radius: 30px;
            max-width: 450px;
            width: 100%;
            margin: 20px auto;
            box-shadow: 0 20px 40px rgba(208, 37, 42, 0.15);
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease;
            border: 1px solid rgba(208, 37, 42, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(208, 37, 42, 0.2);
            position: relative;
            display: inline-block;
        }

        h2:after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .product-image {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 3px solid white;
        }

        .product-image:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(208, 37, 42, 0.2);
        }

        .input-group {
            position: relative;
            margin: 20px 0;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 18px;
        }

        input { 
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
            background: var(--card-light);
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(208, 37, 42, 0.1);
        }

        input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            font-size: 18px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(208, 37, 42, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(208, 37, 42, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #999;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--whatsapp-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            border: none;
            animation: pulse 2s infinite;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background: var(--whatsapp-dark);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.5);
            animation: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(37, 211, 102, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
            }
        }

        .whatsapp-tooltip {
            position: absolute;
            right: 70px;
            background: white;
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            pointer-events: none;
        }

        .whatsapp-float:hover .whatsapp-tooltip {
            opacity: 1;
            visibility: visible;
            right: 80px;
        }

        @media (max-width: 768px) {
            .logo-image {
                height: 90px;
            }
            
            h2 {
                font-size: 28px;
            }

            .btn-primary {
                font-size: 16px;
                padding: 15px;
            }

            .whatsapp-float {
                width: 50px;
                height: 50px;
                font-size: 25px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .logo-image {
                height: 80px;
            }
            
            h2 {
                font-size: 24px;
            }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 8px 15px rgba(208, 37, 42, 0.3);
            }
            50% {
                box-shadow: 0 8px 25px rgba(208, 37, 42, 0.6);
            }
        }

        .mensagem-embreve {
            color: #666;
            margin: 15px 0;
            font-size: 16px;
            line-height: 1.5;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            display: none;
        }

        .debug-panel {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            text-align: left;
            border: 1px solid #eee;
        }

        .debug-panel div {
            margin: 3px 0;
        }
    </style>
</head>
<body>

<header class="header">
    <img src="logo.png" alt="Logo Martinello" class="logo-image">
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon"></i>
    </button>
</header>

<div class="main-container">
    <div class="card">
        <h2 id="tituloPagina">DISPARO EM ANDAMENTO!</h2>
        
        <img id="fotoProduto" class="product-image" src="produto.png" alt="Imagem do Produto">
        
        <!-- Mensagem para tela "EM BREVE" -->
        <div id="mensagemEmBreve" class="mensagem-embreve"></div>
        
        <div class="input-group">
            <i class="fas fa-tag input-icon"></i>
            <input type="text" id="cod" placeholder="DIGITE SUA MATRÍCULA AQUI!" oninput="validarMatricula(this)">
        </div>
        
        <button class="btn-primary" onclick="enviar()" id="btnEnviar">
            <span class="btn-text">GERAR E ENVIAR NO WHATSAPP</span>
        </button>
        
        <!-- PAINEL DE DEBUG -->
        <div class="debug-panel" id="debugPanel">
            <div>🕒 <strong>Horário Brasília (AGORA):</strong> <span id="debugHoraBrasilia"></span></div>
            <div>📅 <strong>Oferta:</strong> <span id="debugOfertaInfo"></span></div>
            <div>⏰ <strong>Status:</strong> <span id="debugStatus"></span></div>
            <div>📊 <strong>Dados brutos:</strong> <span id="debugDados"></span></div>
        </div>
    </div>
</div>

<a href="https://wa.me/556598115091?text=Olá!%20Preciso%20de%20ajuda%20com%20o%20Portal%20do%20Vendedor%20Martinello" 
   class="whatsapp-float" 
   target="_blank"
   title="Suporte via WhatsApp">
    <i class="fab fa-whatsapp"></i>
    <span class="whatsapp-tooltip">Precisa de ajuda?</span>
</a>

<script>
// ============================================
// FUNÇÃO PARA OBTER HORÁRIO DE BRASÍLIA (CORRETA!)
// ============================================
function getHorarioBrasilia() {
    const agora = new Date();
    
    // Converter para UTC
    const utc = Date.UTC(
        agora.getUTCFullYear(),
        agora.getUTCMonth(),
        agora.getUTCDate(),
        agora.getUTCHours(),
        agora.getUTCMinutes(),
        agora.getUTCSeconds()
    );
    
    // Brasília é UTC-3 = subtrair 3 horas em milissegundos
    const brasiliaTime = new Date(utc - (3 * 60 * 60 * 1000));
    
    return brasiliaTime;
}

// ============================================
// FUNÇÃO PARA FORMATAR DATA NO HORÁRIO BRASÍLIA
// ============================================
function formatarBrasilia(data) {
    return data.toLocaleString('pt-BR', {
        timeZone: 'America/Sao_Paulo',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });
}

// ============================================
// TESTE DE OFERTA
// ============================================
function testarOferta() {
    const oferta = JSON.parse(localStorage.getItem('ofertaAtiva'));
    
    if (!oferta) {
        console.log('❌ Nenhuma oferta no localStorage');
        document.getElementById('debugOfertaInfo').innerText = 'Nenhuma oferta ativa';
        return;
    }
    
    // Dados salvos (estão em UTC)
    const inicioUTC = new Date(oferta.dataInicio);
    const fimUTC = new Date(oferta.dataFim);
    
    // Horário atual em Brasília
    const agoraBrasilia = getHorarioBrasilia();
    
    // Converter as datas da oferta para Brasília (para exibição)
    const inicioBrasilia = new Date(inicioUTC.getTime() - (3 * 60 * 60 * 1000));
    const fimBrasilia = new Date(fimUTC.getTime() - (3 * 60 * 60 * 1000));
    
    // COMPARAÇÃO CORRETA: comparar UTC com UTC
    const ofertaAtiva = (agoraBrasilia >= inicioUTC && agoraBrasilia <= fimUTC);
    
    console.log('=== TESTE DE OFERTA ===');
    console.log('1️⃣ Oferta ID:', oferta.id);
    console.log('2️⃣ Início (UTC - salvo):', inicioUTC.toISOString());
    console.log('3️⃣ Fim (UTC - salvo):', fimUTC.toISOString());
    console.log('4️⃣ Agora (Brasília em UTC):', agoraBrasilia.toISOString());
    console.log('5️⃣ Início (Brasília):', formatarBrasilia(inicioBrasilia));
    console.log('6️⃣ Fim (Brasília):', formatarBrasilia(fimBrasília));
    console.log('7️⃣ Agora >= Início?', agoraBrasilia >= inicioUTC);
    console.log('8️⃣ Agora <= Fim?', agoraBrasilia <= fimUTC);
    console.log('9️⃣ RESULTADO:', ofertaAtiva ? '✅ ATIVA' : '❌ INATIVA');
    
    // Atualizar debug na tela
    document.getElementById('debugHoraBrasilia').innerText = formatarBrasilia(agoraBrasilia);
    document.getElementById('debugOfertaInfo').innerHTML = `
        ${oferta.tituloPagina}<br>
        <small>Início: ${formatarBrasilia(inicioBrasilia)}</small><br>
        <small>Fim: ${formatarBrasilia(fimBrasilia)}</small>
    `;
    document.getElementById('debugStatus').innerHTML = ofertaAtiva ? 
        '<span style="color:green">✅ ATIVA</span>' : 
        '<span style="color:red">❌ INATIVA</span>';
    
    // Aplicar na interface
    if (ofertaAtiva) {
        document.getElementById('cod').disabled = false;
        document.getElementById('btnEnviar').disabled = false;
        document.querySelector('.btn-text').textContent = 'GERAR E ENVIAR NO WHATSAPP';
        
        if (oferta.urlImagem) {
            document.getElementById('fotoProduto').src = oferta.urlImagem;
        }
        document.querySelector('h2').innerText = oferta.tituloPagina;
    } else {
        document.getElementById('cod').disabled = true;
        document.getElementById('btnEnviar').disabled = true;
        document.querySelector('.btn-text').textContent = 'EM BREVE';
        document.querySelector('h2').innerText = 'EM BREVE';
    }
}

// Rodar teste a cada segundo
setInterval(testarOferta, 1000);
testarOferta();
</script>

</body>
</html>
